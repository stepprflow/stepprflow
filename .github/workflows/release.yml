name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Type of version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Create as prerelease (RC)'
        required: false
        type: boolean
        default: false
      publish-to:
        description: 'Publish destination'
        required: true
        type: choice
        options:
          - both
          - maven-central
          - github-packages
        default: both

env:
  JAVA_VERSION: '21'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    outputs:
      version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: resolve-version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Triggered by tag push — use version from tag (strip 'v' prefix)
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "mode=tag" >> $GITHUB_OUTPUT
            echo "Releasing from tag: $VERSION"
          else
            # Triggered by workflow_dispatch — bump version
            CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            BASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

            case "${{ inputs.version-type }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            if [ "${{ inputs.prerelease }}" == "true" ]; then
              NEW_VERSION="${NEW_VERSION}-RC1"
            fi

            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "mode=dispatch" >> $GITHUB_OUTPUT
            echo "Bumping to: $NEW_VERSION"
          fi

      - name: Update version in POMs
        if: steps.resolve-version.outputs.mode == 'dispatch'
        run: |
          mvn versions:set -DnewVersion=${{ steps.resolve-version.outputs.version }} -DgenerateBackupPoms=false
          mvn versions:commit

      - name: Build and test
        run: mvn -B clean verify --file pom.xml

      - name: Publish to Maven Central
        if: github.event_name == 'push' || inputs.publish-to == 'maven-central' || inputs.publish-to == 'both'
        run: mvn -B deploy -Prelease -DskipTests --file pom.xml
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to GitHub Packages
        if: inputs.publish-to == 'github-packages' || inputs.publish-to == 'both'
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>\${env.GITHUB_ACTOR}</username>
                <password>\${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
          mvn -B deploy -DskipTests -DaltDeploymentRepository=github::https://maven.pkg.github.com/stepprflow/stepprflow --file pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version change and tag
        if: steps.resolve-version.outputs.mode == 'dispatch'
        run: |
          git add -A
          git commit -m "release: v${{ steps.resolve-version.outputs.version }}"
          git tag "v${{ steps.resolve-version.outputs.version }}"

      - name: Prepare next development version
        if: steps.resolve-version.outputs.mode == 'dispatch'
        run: |
          VERSION="${{ steps.resolve-version.outputs.version }}"
          BASE="${VERSION%-RC*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"

          mvn versions:set -DnewVersion=$NEXT_VERSION -DgenerateBackupPoms=false
          mvn versions:commit

          git add -A
          git commit -m "chore: prepare for next development iteration ($NEXT_VERSION)"

      - name: Push changes
        if: steps.resolve-version.outputs.mode == 'dispatch'
        run: |
          git push origin HEAD
          git push origin "v${{ steps.resolve-version.outputs.version }}"

      - name: Generate release notes
        id: release-notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          fi

          VERSION="${{ steps.resolve-version.outputs.version }}"

          cat > release-notes.md << EOF
          ## What's Changed

          $COMMITS

          ## Installation

          ### Maven Central
          Add to your \`pom.xml\`:

          \`\`\`xml
          <dependency>
              <groupId>io.github.stepprflow</groupId>
              <artifactId>stepprflow-core</artifactId>
              <version>${VERSION}</version>
          </dependency>
          \`\`\`

          For Kafka support:
          \`\`\`xml
          <dependency>
              <groupId>io.github.stepprflow</groupId>
              <artifactId>stepprflow-spring-kafka</artifactId>
              <version>${VERSION}</version>
          </dependency>
          \`\`\`

          For RabbitMQ support:
          \`\`\`xml
          <dependency>
              <groupId>io.github.stepprflow</groupId>
              <artifactId>stepprflow-spring-rabbitmq</artifactId>
              <version>${VERSION}</version>
          </dependency>
          \`\`\`

          ### Docker
          \`\`\`bash
          docker pull ghcr.io/stepprflow/stepprflow-monitor:${VERSION}
          \`\`\`

          **Full Changelog**: https://github.com/stepprflow/stepprflow/compare/${LAST_TAG:-HEAD~50}...v${VERSION}
          EOF

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "v${{ steps.resolve-version.outputs.version }}" \
            --title "Release v${{ steps.resolve-version.outputs.version }}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            stepprflow-core/target/*.jar \
            stepprflow-spring-kafka/target/*.jar \
            stepprflow-spring-rabbitmq/target/*.jar \
            stepprflow-monitoring/target/*.jar

  # Build and publish Docker image
  docker:
    name: Build & Publish Docker Image
    needs: release
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/stepprflow/stepprflow-monitor
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
